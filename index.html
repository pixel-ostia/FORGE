<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FORGE — Bozza Onboarding</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── VARIABILI GLOBALI (Le stesse di prima, pronte per il tuo tema) ── */
    :root {
      --bg:           #07070f;
      --surface:      #0d0d1a;
      --card:         #131320;
      --border:       #252540;
      --accent:       #ff6525;
      --accent2:      #ffaa00;
      --gold:         #ffd700;
      --gold-dim:     #b8860b;
      --text:         #f0f0fa;
      --text-2:       #9090b8;
      --muted:        #4a4a6e;
      --radius:       16px;
      --radius-sm:    10px;
      --font-d:       'Bebas Neue', sans-serif;
      --font-b:       'Outfit', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
    }

    /* ── CONTENITORE PRINCIPALE (Simula lo schermo del telefono) ── */
    .app-container {
      width: 100%;
      max-width: 430px; /* Larghezza tipica smartphone max */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── TYPOGRAPHY ── */
    .title-lg { font-family: var(--font-d); font-size: 36px; letter-spacing: 3px; color: var(--text); }
    .label-caps { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-2); margin-bottom: 8px; display: block; }

    /* ── STRUTTURA PAGINA ── */
    .header { padding: 50px 24px 20px; }
    .content { flex: 1; padding: 10px 24px; }
    .footer { padding: 20px 24px 40px; }

    /* ── BARRA DI PROGRESSO ── */
    .progress-row { display: flex; gap: 5px; margin-top: 20px; }
    .progress-bar { flex: 1; height: 4px; border-radius: 2px; background: var(--border); }
    .progress-bar.done { background: var(--accent2); }
    .progress-bar.active { background: var(--accent); }

    /* ── FORM E INPUT ── */
    .field { margin-bottom: 20px; }
    .field label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-2); }
    .field-row { display: flex; gap: 12px; }
    
    .input-box {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      color: var(--text);
      font-family: var(--font-b);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-box:focus { border-color: var(--accent); }
    .input-box::placeholder { color: var(--muted); }

    /* ── CHIPS (Selettori stile bottoni) ── */
    .chips-container { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip {
      padding: 10px 18px;
      border-radius: 50px;
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--text-2);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    /* Classe da aggiungere con JS/React quando selezionato */
    .chip.active {
      background: rgba(255,101,37,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .chip.premium {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    /* ── BOTTONI ── */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-d);
      font-size: 24px;
      letter-spacing: 2px;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.97); }

  </style>
</head>
<body>

  <div class="app-container">
    
    <div class="header">
      <h1 class="title-lg">CREA IL TUO AVATAR</h1>
      
      <div class="progress-row">
        <div class="progress-bar done"></div>
        <div class="progress-bar active"></div>
        <div class="progress-bar"></div>
        <div class="progress-bar"></div>
      </div>
    </div>

    <div class="content">
      
      <div class="field">
        <label>Come ti chiami, guerriero?</label>
        <input type="text" class="input-box" placeholder="Inserisci il tuo nome" />
      </div>

      <div class="field-row">
        <div class="field" style="flex: 1;">
          <label>Peso (kg)</label>
          <input type="number" class="input-box" placeholder="Es. 75" />
        </div>
        <div class="field" style="flex: 1;">
          <label>Altezza (cm)</label>
          <input type="number" class="input-box" placeholder="Es. 180" />
        </div>
      </div>

      <div class="field">
        <span class="label-caps">Il tuo Obiettivo Principale</span>
        <div class="chips-container">
          <div class="chip active">Massa Muscolare</div>
          <div class="chip">Dimagrimento</div>
          <div class="chip">Forza Pura</div>
          <div class="chip">Tonificazione</div>
        </div>
      </div>

      <div class="field">
        <span class="label-caps">Scegli il tuo Piano</span>
        <div class="chips-container">
          <div class="chip active">Base (Gratis)</div>
          <div class="chip premium">Premium (Scheda IA)</div>
        </div>
      </div>

    </div>

    <div class="footer">
      <button class="btn-primary">AVANTI</button>
    </div>

  </div>

</body>
</html>
